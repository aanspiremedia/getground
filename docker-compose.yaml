services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: getground
      POSTGRES_PASSWORD: getground123
      POSTGRES_DB: getground_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
